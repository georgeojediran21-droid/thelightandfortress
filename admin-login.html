<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - The Light and Fortress Alliance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand brand" href="index.html"><img src="ChatGPT Image Jun 18, 2026, 01_53_04 AM.png" alt="The Light and Fortress Alliance logo"><span>The Light and<br>Fortress Alliance</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                  
                   
                    
                </ul>
            </div>
        </nav>
    </header>

    <main class="login-page">
        <section class="login-shell">
            <div class="login-visual" aria-hidden="true">
                <div class="login-visual-content">
                    <img src="ChatGPT Image Jun 18, 2026, 01_53_04 AM.png" alt="">
                    <p class="eyebrow">Admin access</p>
                    <h1>Control room</h1>
                    <p>Sign in with an administrator account to manage members, updates, notifications, and media.</p>
                </div>
            </div>

            <div class="login-panel">
                <div class="login-card">
                    <div class="login-card-heading">
                        <p class="eyebrow">Admin login</p>
                        <h2>Authorized access only</h2>
                        <p>Use the email and password for an admin account.</p>
                    </div>
                    <div id="adminLoginMessage"></div>
                    <form id="adminLoginForm">
                        <div class="field-group">
                            <label class="form-label" for="adminLoginEmail">Email</label>
                            <input id="adminLoginEmail" class="form-control" type="email" name="email" autocomplete="email" required>
                        </div>
                        <div class="field-group">
                            <label class="form-label" for="adminLoginPassword">Password</label>
                            <input id="adminLoginPassword" class="form-control" type="password" name="password" autocomplete="current-password" required>
                        </div>
                        <label class="login-check">
                            <input type="checkbox" id="showAdminPassword">
                            <span>Show password</span>
                        </label>
                        <div class="login-links">
                            <a href="admin-forget-password.html">Forgot password?</a>
                        </div>
                        <button class="btn login-submit" type="submit">Open Admin Panel</button>
                        
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
